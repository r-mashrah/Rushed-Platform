name: quiz_master_app
description: Automated Quiz Generator App for Students (Frontend Only)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  get: ^4.6.6
  get_storage: ^2.1.1
  google_fonts: ^6.1.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.65.0
  intl: ^0.18.1
  cupertino_icons: ^1.0.8
  curved_navigation_bar: ^1.0.6
  path: ^1.9.1
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.6
  supabase_flutter: ^2.12.0
  flutter_dotenv: ^5.2.1
  flutter_pdfview: ^1.4.4
  path_provider: ^2.1.5
  dio: ^5.9.1
  permission_handler: ^12.0.1
  image_picker: ^1.2.1
  haptic_feedback: ^0.6.4+3
  flutter_svg: ^2.2.3
  firebase_messaging: ^16.1.3
  firebase_core: ^4.6.0
  flutter_local_notifications: ^20.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icon/
    - lib/ai_services/sample_curriculum.json
  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Regular.ttf
          weight: 400
